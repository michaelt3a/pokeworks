<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokeworks</title>
  <meta name="description" content="Pokeworks — a minigame." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="game-shell">
    <header class="hud">
      <div class="hud-left">
        <img src="pokeworks-logo-circle-1.png" alt="Pokeworks" class="logo" />
      </div>
      <div class="hud-right">
        <div class="score">
          <span class="score-label">Best</span>
          <span id="high-score" class="score-value">0</span>
        </div>
        <div class="score">
          <span class="score-label">Score</span>
          <span id="score" class="score-value">0</span>
        </div>
      </div>
    </header>

    <main class="stage">
      <!-- Gameplay will be rendered here -->
      <canvas id="game" class="game-canvas" width="800" height="600"></canvas>

      <!-- Perfect-drop combo counter (top-right of the box) -->
      <div id="combo" class="combo hidden"><span id="combo-count">x2</span></div>

      <!-- Start overlay -->
      <div id="overlay" class="overlay">
        <!-- Start screen -->
        <div id="screen-start" class="overlay-panel">
          <h1 class="overlay-title">Bowl Builder</h1>
          <p class="overlay-subtitle">Stack the ingredients to score.</p>
          <button id="start-btn" class="btn" type="button">Start</button>
        </div>

        <!-- Difficulty screen -->
        <div id="screen-difficulty" class="overlay-panel hidden">
          <h1 class="overlay-title">Choose Difficulty</h1>
          <div class="difficulty-options">
            <button class="btn difficulty-btn" type="button" data-difficulty="easy">Easy</button>
            <button class="btn difficulty-btn" type="button" data-difficulty="medium">Medium</button>
            <button class="btn difficulty-btn" type="button" data-difficulty="impossible">Impossible</button>
          </div>
        </div>

        <!-- Reward screen -->
        <div id="screen-reward" class="overlay-panel hidden">
          <div class="reward-emoji">🎉</div>
          <h1 class="overlay-title">Congrats!</h1>
          <p class="overlay-subtitle">You reached 30 — here's 5% off your next bowl.</p>
          <div class="reward-code">POKEREWARDS30</div>
          <div class="reward-actions">
            <a id="order-btn" class="btn" href="https://order.thanx.com/pokeworks" target="_blank" rel="noopener noreferrer">Order Now</a>
            <button id="reward-btn" class="btn btn-secondary" type="button">Keep Playing</button>
          </div>
        </div>

        <!-- Paused screen -->
        <div id="screen-paused" class="overlay-panel hidden">
          <h1 class="overlay-title">Paused</h1>
          <div class="gameover-actions">
            <button id="resume-btn" class="btn" type="button">Resume</button>
            <button id="pause-quit-btn" class="btn btn-secondary" type="button">Quit</button>
          </div>
        </div>

        <!-- Game over screen -->
        <div id="screen-gameover" class="overlay-panel hidden">
          <h1 class="overlay-title">Game Over</h1>
          <p class="gameover-quip" id="gameover-quip">Nice job!</p>
          <p class="overlay-subtitle" id="gameover-subtitle">Nice bowl!</p>
          <div class="gameover-actions">
            <button id="play-again-btn" class="btn" type="button">Play Again</button>
            <button id="quit-btn" class="btn btn-secondary" type="button">Quit</button>
          </div>
        </div>
      </div>

      <!-- Confetti overlay (in front, non-interactive) -->
      <canvas id="confetti" class="confetti" width="800" height="600"></canvas>
    </main>

    <!-- Controls below the box -->
    <div class="controls">
      <button id="pause-btn" class="control-btn" type="button">⏸ Pause</button>
      <button id="mute-btn" class="control-btn" type="button">🔊 Sound</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
