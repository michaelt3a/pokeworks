<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokeworks Minigames</title>
  <meta name="description" content="Pokeworks minigames. Pick one to play." />
  <link rel="stylesheet" href="menu.css?v=9" />
</head>
<body>
  <main class="hub page-content">
    <header class="hub-header">
      <img src="pokeworks-logo-circle-1.png" alt="Pokeworks" class="hub-logo" />
      <h1 class="hub-title">Minigames</h1>
      <p class="hub-subtitle">Pick a game to play.</p>
    </header>

    <div class="cards">
      <a class="card" href="bowl-builder.html">
        <div class="card-icon icon-bowl"></div>
        <div class="card-body">
          <h2 class="card-title">Bowl Builder</h2>
          <p class="card-desc">Stack ingredients into the perfect poke bowl.</p>
          <span class="badge badge-play">Play</span>
        </div>
      </a>

      <a class="card" href="placeholder-1.html">
        <div class="card-icon icon-signature"></div>
        <div class="card-body">
          <h2 class="card-title">Signature Works</h2>
          <p class="card-desc">Build the 9 signature bowls from memory.</p>
          <span class="badge badge-play">Play</span>
        </div>
      </a>

      <a class="card" href="order-up.html">
        <div class="card-icon icon-order"></div>
        <div class="card-body">
          <h2 class="card-title">Order Up</h2>
          <p class="card-desc">Fill customer orders before they leave.</p>
          <span class="badge badge-play">Play</span>
        </div>
      </a>

      <a class="card" href="secret-shopper.html">
        <div class="card-icon icon-shopper"></div>
        <div class="card-body">
          <h2 class="card-title">Secret Shopper</h2>
          <p class="card-desc">Ace every step of the secret shopper's visit.</p>
          <span class="badge badge-play">Play</span>
        </div>
      </a>
    </div>
  </main>

  <script src="transitions.js?v=3"></script>
</body>
</html>
