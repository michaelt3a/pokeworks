<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahi Slice — Pokeworks</title>
  <meta name="description" content="Pokeworks — Ahi Slice minigame." />
  <link rel="stylesheet" href="styles.css?v=10" />
  <link rel="stylesheet" href="ahi-slice.css?v=1" />
</head>
<body>
  <a href="index.html" class="back-link">← Minigames</a>

  <div class="game-shell page-content">
    <header class="hud">
      <div class="hud-left">
        <img src="pokeworks-logo-circle-1.png" alt="Pokeworks" class="logo" />
      </div>
      <div class="hud-right">
        <div class="lives" id="lives" aria-label="Lives"></div>
        <div class="score">
          <span class="score-label">Score</span>
          <span id="score" class="score-value">0</span>
        </div>
        <div class="score">
          <span class="score-label">Best</span>
          <span id="best" class="score-value">0</span>
        </div>
      </div>
    </header>

    <main class="stage slice-stage">
      <canvas id="game" class="game-canvas" width="800" height="600"></canvas>

      <div id="combo" class="slice-combo hidden">Combo x3</div>
      <div id="slowmo" class="slice-slowmo hidden">🐢 Slow-mo</div>

      <div id="overlay" class="overlay">
        <div id="screen-start" class="overlay-panel">
          <h1 class="overlay-title">Ahi Slice</h1>
          <p class="overlay-subtitle">Swipe to slice the ingredients — the fresher (brighter) they are, the more points. Grab the golden star for slow-mo, and never slice the wasabi bombs!</p>
          <button id="start-btn" class="btn" type="button">Start Slicing</button>
        </div>

        <div id="screen-over" class="overlay-panel hidden">
          <h1 class="overlay-title">Game Over</h1>
          <p class="slice-final" id="final"></p>
          <div class="gameover-actions">
            <button id="again-btn" class="btn" type="button">Play Again</button>
            <a href="index.html" class="btn btn-secondary">Quit</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="transitions.js?v=3"></script>
  <script src="bowl-render.js?v=4"></script>
  <script src="ahi-slice.js?v=1"></script>
</body>
</html>
