<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Up - Pokeworks</title>
  <meta name="description" content="Pokeworks Order Up rush minigame." />
  <link rel="stylesheet" href="styles.css?v=14" />
  <link rel="stylesheet" href="order-up.css?v=11" />
  <link rel="stylesheet" href="theme.css?v=3" />
  <meta name="theme-color" content="#0a1010" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <script src="theme.js?v=3"></script>
  <script src="sound.js?v=1"></script>
  <script src="streak.js?v=1"></script>
</head>
<body>
  <a href="index.html" class="back-link">← Minigames</a>

  <div class="game-shell page-content">
    <header class="hud">
      <div class="hud-left">
        <img src="pokeworks-logo-circle-1.png" alt="Pokeworks" class="logo" />
      </div>
      <div class="hud-right">
        <div class="ou-stars" id="ou-stars" aria-label="Restaurant rating">
          <span class="ou-starbar" aria-hidden="true">
            <span class="ou-star-base">★★★★★</span>
            <span class="ou-star-fill" id="ou-star-fill">★★★★★</span>
          </span>
          <span class="ou-star-num" id="ou-star-num">3.0</span>
        </div>
        <div class="score">
          <span class="score-label">Time</span>
          <span id="ou-time" class="score-value ou-time">2:30</span>
        </div>
        <div class="score">
          <span class="score-label">Shift</span>
          <span id="score" class="score-value">$0</span>
        </div>
        <div class="score">
          <span class="score-label">Best</span>
          <span id="best" class="score-value">$0</span>
        </div>
      </div>
    </header>

    <div class="ou-stage">
      <!-- Store scene: tiled wall + stick-figure customers across the counter -->
      <div class="ou-scene">
        <div class="ou-tables" id="tables"></div>
        <div class="ou-customers" id="customers"></div>
        <div class="ou-worker hidden" id="worker"></div>
        <div class="ou-guard"></div>
      </div>

      <!-- Ingredient line: pick a station on the left, its steam pans fill the grid -->
      <div class="ou-line" id="line">
        <div class="ou-stations" id="stations"></div>
        <div class="ou-pans" id="pans"></div>
      </div>

      <!-- Prep counter: the worker's side — order ticket + the bowl -->
      <div class="ou-counter">
        <div class="ou-ticket">
          <div class="ou-ticket-name" id="order-name">…</div>
          <div class="ou-checklist" id="checklist"></div>
        </div>
        <div class="ou-bowl-wrap">
          <canvas id="bowl" width="560" height="320" class="ou-bowl"></canvas>
          <div class="ou-combo hidden" id="combo">🔥 x2</div>
          <button id="serve-btn" class="ou-serve" type="button">🛎 Serve</button>
        </div>
      </div>

      <!-- Overlays -->
      <div class="ou-overlay" id="overlay">
        <div class="ou-panel" id="screen-start">
          <h1 class="overlay-title">Order Up</h1>
          <p class="overlay-subtitle">Serve bowls for money — mistakes pay less and cost you stars. Bank it, buy upgrades, build a 5★ shop. Choose a mode:</p>
          <div class="ou-modes">
            <button id="start-baby" class="btn btn-secondary" type="button">Baby Mode</button>
            <button id="start-normal" class="btn" type="button">Recipes Shown</button>
            <button id="start-hard" class="btn btn-secondary" type="button">Hidden Recipes</button>
          </div>
        </div>
        <div class="ou-panel hidden" id="screen-over">
          <h1 class="overlay-title">Shift Over</h1>
          <p class="ou-final" id="final"></p>
          <p class="ou-bank hidden" id="ou-bank"></p>
          <div class="ou-shop hidden" id="ou-shop"></div>
          <!-- Name entry for the hub leaderboard -->
          <div id="ou-lb-entry" class="lb-entry hidden">
            <p class="lb-entry-msg">🏆 Add your score to the leaderboard!</p>
            <div class="lb-entry-row">
              <input id="ou-lb-name" class="lb-input" type="text" maxlength="12" placeholder="Your name" autocomplete="off" />
              <button id="ou-lb-save" class="btn" type="button">Save</button>
            </div>
          </div>
          <p id="ou-lb-done" class="lb-entry-msg lb-done hidden">✓ Saved! See the leaderboard on the hub.</p>
          <div class="gameover-actions">
            <button id="again-btn" class="btn" type="button">Next Shift ▸</button>
            <a href="index.html" class="btn btn-secondary">Quit</a>
          </div>
        </div>
      </div>

      <!-- Guest review notifications (top-right, like Secret Shopper's) -->
      <div class="ou-toasts" id="ou-toasts"></div>
    </div>
  </div>

  <script src="transitions.js?v=3"></script>
  <script src="supabase-config.js?v=2"></script>
  <script src="achievements.js?v=4"></script>
  <script src="bowl-render.js?v=3"></script>
  <script src="daily.js?v=2"></script>
  <script src="order-up.js?v=17"></script>
  <script src="back-guard.js?v=1"></script>
  <script src="pwa.js?v=1"></script>
</body>
</html>
