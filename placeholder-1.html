<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signature Works — Pokeworks</title>
  <meta name="description" content="Learn the Pokeworks signature works." />
  <link rel="stylesheet" href="styles.css?v=7" />
  <link rel="stylesheet" href="placeholder-1.css?v=8" />
</head>
<body>
  <a href="index.html" class="back-link">← Minigames</a>

  <div class="game-shell page-content">
    <header class="hud">
      <div class="hud-left">
        <img src="pokeworks-logo-circle-1.png" alt="Pokeworks" class="logo" />
      </div>
      <div class="hud-right">
        <span id="sr-progress" class="sr-progress" hidden></span>
        <span id="sr-timer" class="sr-timer" hidden>0:00.0</span>
        <span id="recipe-name" class="recipe-name"></span>
        <button id="change-recipe" class="control-btn" type="button" hidden>Change</button>
      </div>
    </header>

    <div class="builder-shell" id="builder-shell">
      <!-- The build area (bowl + palette) -->
      <div class="builder" id="builder" hidden>
        <div class="bowl-area" id="bowl-area">
          <button id="hint-btn" class="hint-btn" type="button" aria-label="Hint" title="Reveal one ingredient">?<span id="hint-count" class="hint-count">0</span></button>
          <div id="hint-pop" class="hint-pop hidden"></div>
          <canvas id="bowl" class="bowl-canvas" width="560" height="320"></canvas>
          <p class="drop-hint" id="drop-hint">Tap or drag ingredients into the bowl</p>
          <div class="bowl-contents" id="bowl-contents"></div>
        </div>

        <div class="palette">
          <div class="tabs" id="tabs"></div>
          <div class="chips" id="chips"></div>
        </div>

        <div class="builder-actions">
          <button id="check-btn" class="btn" type="button">Check Bowl</button>
          <button id="next-bowl-btn" class="btn" type="button" hidden>Next Bowl →</button>
          <button id="clear-btn" class="btn btn-secondary" type="button">Clear</button>
        </div>
        <p class="feedback" id="feedback"></p>
      </div>

      <!-- Recipe (signature work) selection -->
      <div id="overlay" class="overlay">
        <div class="overlay-panel">
          <h1 class="overlay-title">Signature Works</h1>
          <p class="overlay-subtitle">Practiceee! 🎉</p>
          <button id="speedrun-btn" class="speedrun-btn" type="button">
            <span class="speedrun-ico">⏱</span>
            <span class="speedrun-txt">Speedrun<small>Build all 9 + timed.</small></span>
          </button>
          <p class="overlay-note">— or pick one to practice —</p>
          <div class="recipe-grid" id="recipe-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Speedrun results board (full-screen, outside the transformed page wrapper) -->
  <div id="results" class="results hidden">
    <canvas id="results-confetti" class="results-confetti"></canvas>
    <div class="results-panel">
      <button id="results-close" class="results-close" type="button" aria-label="Close">✕</button>
      <h2 class="results-title">Speedrun Complete!</h2>
      <p class="results-summary" id="results-summary"></p>
      <div class="results-legend">
        <span class="rp ok">✓ correct</span>
        <span class="rp miss">＋ missed</span>
        <span class="rp bad">✕ incorrect</span>
      </div>
      <div class="results-grid" id="results-grid"></div>
      <div class="results-actions">
        <button id="results-again" class="btn" type="button">Try Again</button>
        <button id="results-menu" class="btn btn-secondary" type="button">Pick a Recipe</button>
      </div>
    </div>
  </div>

  <!-- Correct! celebration (full-screen, outside the transformed page wrapper) -->
  <div id="success" class="success hidden">
    <canvas id="success-confetti" class="success-confetti" width="560" height="500"></canvas>
    <div class="success-card">
      <div class="success-check">✓</div>
      <h2 class="success-title">Correct!</h2>
      <p class="success-sub" id="success-sub"></p>
      <button id="next-btn" class="btn" type="button">Pick Another</button>
    </div>
  </div>

  <script src="transitions.js?v=3"></script>
  <script src="placeholder-1.js?v=13"></script>
</body>
</html>
