<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Shopper - Pokeworks</title>
  <meta name="description" content="Pokeworks Secret Shopper minigame." />
  <link rel="stylesheet" href="styles.css?v=14" />
  <link rel="stylesheet" href="secret-shopper.css?v=9" />
  <link rel="stylesheet" href="theme.css?v=3" />
  <meta name="theme-color" content="#0a1010" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <script src="theme.js?v=3"></script>
  <script src="sound.js?v=1"></script>
  <script src="streak.js?v=1"></script>
</head>
<body>
  <a href="index.html" class="back-link">← Minigames</a>

  <div class="game-shell page-content">
    <header class="hud">
      <div class="hud-left">
        <img src="pokeworks-logo-circle-1.png" alt="Pokeworks" class="logo" />
      </div>
      <div class="hud-right">
        <div class="score">
          <span class="score-label">Best</span>
          <span id="best" class="score-value">0%</span>
        </div>
      </div>
    </header>

    <main class="ss-stage">
      <!-- The store scene -->
      <div class="ss-scene" id="scene">
        <!-- Pokeworks sign on the tile wall -->
        <img class="ss-sign" src="pokeworks-logo-circle-1.png" alt="" />

        <!-- Menu boards above the counter -->
        <div class="ss-menus" aria-hidden="true"><i></i><i class="accent"></i><i></i></div>

        <!-- Entrance door (left) -->
        <div class="ss-doorway">
          <div class="ss-door" id="door"></div>
        </div>

        <!-- Dining table (left side, near the window) -->
        <div class="ss-table" id="table"></div>

        <!-- Counter (right) with the employee (you) behind it -->
        <div class="ss-actor ss-emp" id="emp-wrap">
          <div class="ss-bubble hidden" id="emp-bubble"></div>
          <div class="ss-stick" id="emp-stick"></div>
        </div>
        <div class="ss-countertop"></div>

        <!-- The current guest -->
        <div class="ss-actor ss-cust" id="cust-wrap">
          <div class="ss-bubble hidden" id="cust-bubble"></div>
          <div class="ss-stick" id="cust-stick"></div>
        </div>

        <!-- A surprise walk-in guest (event) -->
        <div class="ss-actor ss-extra hidden" id="extra-wrap">
          <div class="ss-bubble hidden" id="extra-bubble"></div>
          <div class="ss-stick" id="extra-stick"></div>
        </div>
      </div>

      <!-- Prompt / choices panel -->
      <div class="ss-prompt">
        <div class="ss-timer hidden" id="timer"><i id="timer-fill"></i></div>
        <p class="ss-title" id="prompt-title">…</p>
        <div class="ss-choices" id="choices"></div>
      </div>

      <!-- Start overlay -->
      <div class="ss-overlay" id="overlay">
        <div class="ss-panel">
          <h1 class="overlay-title">Secret Shopper</h1>
          <p class="overlay-subtitle">The secret shopper is somewhere in your shift. Three guests are coming, but you won't know which one it is. Ace the hospitality audit.</p>
          <button id="start-btn" class="btn" type="button">Clock In</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Audit scorecard (full-screen) -->
  <div id="scorecard" class="ss-results hidden">
    <div class="ss-results-panel">
      <div class="ss-audit-header" id="audit-header">HOSPITALITY 0% (0/25)</div>
      <p class="ss-grade" id="grade"></p>
      <div class="ss-audit-rows" id="audit-rows"></div>
      <div class="ss-results-actions">
        <button id="again-btn" class="btn" type="button">Next Shift</button>
        <a href="index.html" class="btn btn-secondary">Quit</a>
      </div>
    </div>
  </div>

  <script src="transitions.js?v=3"></script>
  <script src="achievements.js?v=6"></script>
  <script src="bowl-render.js?v=4"></script>
  <script src="secret-shopper.js?v=12"></script>
  <script src="back-guard.js?v=1"></script>
  <script src="pwa.js?v=1"></script>
</body>
</html>
